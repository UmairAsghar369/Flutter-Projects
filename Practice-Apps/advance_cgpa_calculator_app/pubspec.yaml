name: advance_cgpa_calculator_app
description: "Advanced CGPA Calculator — production-level Flutter app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: any

  # Local database
  hive: any
  hive_flutter: any

  # Charts
  fl_chart: any

  # PDF export
  pdf: any
  printing: any

  # Screenshot & sharing
  screenshot: any
  share_plus: any

  # File paths
  path_provider: any

  # Typography
  google_fonts: any

  # Animations
  flutter_animate: any

  # Utilities
  uuid: any
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

