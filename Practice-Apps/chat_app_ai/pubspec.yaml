name: chat_app_ai
description: "AuraAI - A premium AI chat application powered by Google Gemini."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Gemini AI
  google_generative_ai: ^0.4.6

  # State management
  flutter_riverpod: ^2.5.1

  # Markdown rendering
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2

  # Syntax highlighting
  flutter_highlight: ^0.7.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Spacing
  gap: ^3.0.1

  # UUID generation
  uuid: ^4.4.0

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
